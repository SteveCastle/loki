{{ define "login" }}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lowkey Media Server – Login</title>
    <link rel="stylesheet" href="/static/styles.css" />
    <style>
      /* Page-specific layer on top of the design system tokens. */
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: var(--space-4);
      }
      .login-card {
        width: 100%;
        max-width: 380px;
        background: linear-gradient(145deg, var(--bg-elevated) 0%, var(--bg-surface) 100%);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-xl);
        padding: var(--space-8);
        box-shadow: var(--shadow-lg);
        animation: fadeIn 0.3s ease;
      }
      .login-header {
        text-align: center;
        margin-bottom: var(--space-6);
      }
      .login-header .wordmark {
        font-size: var(--text-xl);
        font-weight: 700;
        letter-spacing: -0.02em;
        color: var(--text-primary);
        margin: 0;
      }
      .login-header .wordmark .accent { color: var(--accent-primary); }
      .login-header p {
        color: var(--text-muted);
        margin: var(--space-2) 0 0;
        font-size: var(--text-sm);
      }
      .form-group { margin-bottom: var(--space-4); }
      .form-group label {
        display: block;
        margin-bottom: var(--space-2);
        color: var(--text-secondary);
        font-size: var(--text-sm);
      }
      .btn-submit {
        width: 100%;
        margin-top: var(--space-2);
        padding: var(--space-3);
        font-size: var(--text-sm);
        font-weight: 600;
        background: var(--accent-primary);
        color: #000;
        border: 1px solid var(--accent-primary);
        border-radius: var(--radius-md);
        cursor: pointer;
        transition: all var(--transition-fast);
      }
      .btn-submit:hover:not(:disabled) {
        background: #00e6b8;
        border-color: #00e6b8;
      }
      .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
      .error-message,
      .success-message {
        font-size: var(--text-sm);
        margin-top: var(--space-4);
        text-align: center;
        display: none;
        padding: var(--space-3);
        border-radius: var(--radius-lg);
      }
      .error-message {
        color: var(--status-error);
        background: var(--status-error-dim);
        border: 1px solid rgba(239, 68, 68, 0.25);
      }
      .success-message {
        color: var(--status-success);
        background: var(--status-success-dim);
        border: 1px solid rgba(34, 197, 94, 0.25);
      }
      .setup-info {
        background: var(--accent-primary-dim);
        border: 1px solid rgba(0, 212, 170, 0.25);
        border-radius: var(--radius-lg);
        padding: var(--space-4);
        margin-bottom: var(--space-5);
        text-align: center;
      }
      .setup-info p {
        color: var(--text-secondary);
        margin: 0;
        font-size: var(--text-sm);
        line-height: 1.5;
      }
      .setup-info strong { color: var(--accent-primary); }
      .hidden { display: none !important; }
    </style>
  </head>
  <body>
    <div class="login-card">
      <div class="login-header">
        <h1 class="wordmark">lowkey<span class="accent">.</span></h1>
        <p id="headerSubtitle">Sign in to your library</p>
      </div>

      <!-- Login Form -->
      <form id="loginForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" class="input" required autofocus />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="input" required />
        </div>
        <button type="submit" class="btn-submit">Sign In</button>
        <div id="error" class="error-message"></div>
      </form>

      <!-- Setup Form (create new user) -->
      <form id="setupForm" class="hidden">
        <div class="setup-info">
          <p>
            You're using the default admin account.<br />
            Please create a <strong>new user account</strong> to continue.
          </p>
        </div>
        <div class="form-group">
          <label for="newUsername">New Username</label>
          <input
            type="text"
            id="newUsername"
            class="input"
            required
            placeholder="Choose a username"
          />
        </div>
        <div class="form-group">
          <label for="newPassword">New Password</label>
          <input
            type="password"
            id="newPassword"
            class="input"
            required
            placeholder="Choose a password"
          />
        </div>
        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input
            type="password"
            id="confirmPassword"
            class="input"
            required
            placeholder="Confirm password"
          />
        </div>
        <button type="submit" class="btn-submit">Create Account & Sign In</button>
        <div id="setupError" class="error-message"></div>
        <div id="setupSuccess" class="success-message"></div>
      </form>
    </div>

    <script>
      const loginForm = document.getElementById('loginForm');
      const setupForm = document.getElementById('setupForm');
      const headerSubtitle = document.getElementById('headerSubtitle');

      // Check if we're in setup mode from URL params
      const params = new URLSearchParams(window.location.search);
      if (params.get('setup') === 'true') {
        showSetupForm();
      }

      function showSetupForm() {
        loginForm.classList.add('hidden');
        setupForm.classList.remove('hidden');
        headerSubtitle.textContent = 'Create your account';
        document.getElementById('newUsername').focus();
      }

      function showLoginForm() {
        setupForm.classList.add('hidden');
        loginForm.classList.remove('hidden');
        headerSubtitle.textContent = 'Sign in to your library';
      }

      // Login form handler
      loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const errorEl = document.getElementById('error');
        const btn = e.target.querySelector('button');

        errorEl.style.display = 'none';
        btn.disabled = true;
        btn.textContent = 'Signing in...';

        try {
          const res = await fetch('/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password }),
          });

          const data = await res.json();

          if (res.ok) {
            // Check if setup is required
            if (data.setup_required) {
              showSetupForm();
              btn.disabled = false;
              btn.textContent = 'Sign In';
              return;
            }
            // Normal login - redirect
            const redirect = params.get('redirect') || '/';
            window.location.href = redirect;
          } else {
            throw new Error(data.error || 'Login failed');
          }
        } catch (err) {
          errorEl.textContent = err.message;
          errorEl.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Sign In';
        }
      });

      // Setup form handler
      setupForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('newUsername').value.trim();
        const password = document.getElementById('newPassword').value;
        const confirmPassword =
          document.getElementById('confirmPassword').value;
        const errorEl = document.getElementById('setupError');
        const successEl = document.getElementById('setupSuccess');
        const btn = e.target.querySelector('button');

        errorEl.style.display = 'none';
        successEl.style.display = 'none';

        // Validate
        if (username.length < 3) {
          errorEl.textContent = 'Username must be at least 3 characters';
          errorEl.style.display = 'block';
          return;
        }
        if (password.length < 4) {
          errorEl.textContent = 'Password must be at least 4 characters';
          errorEl.style.display = 'block';
          return;
        }
        if (password !== confirmPassword) {
          errorEl.textContent = 'Passwords do not match';
          errorEl.style.display = 'block';
          return;
        }

        btn.disabled = true;
        btn.textContent = 'Creating account...';

        try {
          // Create the new user
          const createRes = await fetch('/auth/users', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password }),
          });

          if (!createRes.ok) {
            const text = await createRes.text();
            throw new Error(text || 'Failed to create user');
          }

          successEl.textContent = 'Account created! Signing you in...';
          successEl.style.display = 'block';

          // Now log in with the new credentials
          const loginRes = await fetch('/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password }),
          });

          if (loginRes.ok) {
            const redirect = params.get('redirect') || '/';
            window.location.href = redirect;
          } else {
            throw new Error(
              'Account created but login failed. Please sign in manually.'
            );
          }
        } catch (err) {
          errorEl.textContent = err.message;
          errorEl.style.display = 'block';
          successEl.style.display = 'none';
          btn.disabled = false;
          btn.textContent = 'Create Account & Sign In';
        }
      });
    </script>
  </body>
</html>
{{ end }}
