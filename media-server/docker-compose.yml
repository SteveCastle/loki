# =============================================================================
# Lowkey Media Server + MinIO (S3-compatible object storage)
# =============================================================================
# Three services:
#   - minio        : S3-compatible object storage. API on host 19000, web
#                    console on host 19001. Default creds: admin / adminadmin.
#   - minio-setup  : one-shot job that creates the 'media' bucket.
#   - media-server : the Lowkey server image (built via the parent Dockerfile)
#                    configured to use MinIO as its sole storage root.
#
# Run from the REPO ROOT (the SPA build stage needs files there):
#
#   docker compose -f media-server/docker-compose.yml up --build
#   open http://localhost:18090
#   # MinIO console: http://localhost:19001 (admin / adminadmin)
#
# Tear down + drop volumes:
#   docker compose -f media-server/docker-compose.yml down -v
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # MinIO — S3-compatible storage
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: lowkey-minio
    ports:
      - "19000:9000"   # S3 API
      - "19001:9001"   # Web console
    volumes:
      - minio-data:/data
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: adminadmin
    command: server /data --console-address ":9001"
    restart: unless-stopped
    healthcheck:
      # Built-in HTTP health endpoint — works without bundling `mc`.
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s

  # One-shot: create the bucket the server expects. Exits when done.
  minio-setup:
    image: minio/mc:latest
    container_name: lowkey-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 admin adminadmin &&
      mc mb --ignore-existing local/media &&
      mc mb --ignore-existing local/media-thumbnails &&
      echo 'MinIO buckets ready.'
      "

  # ---------------------------------------------------------------------------
  # Lowkey Media Server
  # ---------------------------------------------------------------------------
  lowkey-media-server:
    image: lowkey-media-server:test
    build:
      # SPA source lives at the repo root, so compose context must point there.
      context: ..
      dockerfile: media-server/Dockerfile
    container_name: lowkey-media-server
    ports:
      # Host port (set LOWKEY_PORT in your shell/.env) → container port. The
      # server inside the container listens on its default 10111; to change
      # the *container* port instead, add LOWKEY_PORT under `environment:`
      # and update the right-hand side here to match.
      - "${LOWKEY_PORT:-18090}:10111"
    volumes:
      - lowkey-data:/data
      # Mount local media directories on top of the S3 root if you like:
      # - /path/to/photos:/mnt/photos:ro
    environment:
      # ---- Persistent state ----
      LOWKEY_DB_PATH: /data/db/media.db
      LOWKEY_DOWNLOAD_PATH: /data/downloads
      XDG_DATA_HOME: /data

      # ---- Ollama ----
      LOWKEY_OLLAMA_BASE_URL: ${LOWKEY_OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      LOWKEY_OLLAMA_MODEL: ${LOWKEY_OLLAMA_MODEL:-llama3.2-vision}
      LOWKEY_JWT_SECRET: ${LOWKEY_JWT_SECRET:-}

      # ---- Storage roots ----
      # One S3-backed root pointing at MinIO. The endpoint uses the compose-
      # network service name 'minio:9000'. The Go S3 backend always uses
      # path-style addressing (storage/s3.go), so it works with MinIO,
      # Backblaze B2, Wasabi, etc. without extra config.
      #
      # Override at run time with `-e LOWKEY_ROOTS=...` to plug in real
      # AWS S3, Cloudflare R2, etc., or to add local mounts.
      LOWKEY_ROOTS: |
        [
          {
            "type": "s3",
            "label": "MinIO",
            "bucket": "media",
            "endpoint": "http://minio:9000",
            "region": "us-east-1",
            "accessKey": "admin",
            "secretKey": "adminadmin",
            "thumbnailPrefix": "_thumbnails",
            "default": true
          }
        ]
    restart: unless-stopped
    depends_on:
      minio-setup:
        condition: service_completed_successfully
    extra_hosts:
      # Lets Linux Docker Engine resolve host.docker.internal for Ollama
      # access (Docker Desktop on Mac/Windows handles this automatically).
      - "host.docker.internal:host-gateway"

volumes:
  lowkey-data:
  minio-data:
