name: Release

on:
  push:
    branches:
      - master
    # Only release when something that affects a build artifact changes.
    # Docs-only or tooling-only commits (e.g. docs/**, .gitignore, CLAUDE.md)
    # no longer kick off the build/release pipeline. Lean inclusive here — a
    # missed release is worse than a redundant one.
    paths:
      - 'src/**' # electron renderer/main; also the SPA embedded in the Go server
      - 'assets/**' # bundled icons/images
      - 'release/app/**' # electron-builder app manifest + native deps
      - '.erb/**' # webpack / build configuration
      - 'scripts/**' # build helpers (build-server.js, etc.)
      - 'media-server/**' # Go media server
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'schema.sql'
      - '.github/workflows/release.yml' # pipeline fixes should release too
  # Manual trigger so a release can be cut without a code change (e.g. re-run a
  # failed publish, or release after a tooling-only change).
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  test-electron:
    name: Test Electron App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --frozen-lockfile

      - name: Run tests
        run: npm test

  test-go:
    name: Test Go Server
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: media-server/go.sum

      - name: Run Go tests
        working-directory: ./media-server
        run: go test ./...

  version-and-tag:
    name: Version and Tag
    needs: [test-electron, test-go]
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      tag: ${{ steps.set-tag.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version from package.json
        id: get-version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Check if tag exists
        id: check-tag
        run: |
          if git rev-parse "v${{ steps.get-version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create and push tag
        if: steps.check-tag.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG="v${{ steps.get-version.outputs.version }}"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Set tag output
        id: set-tag
        run: |
          TAG="v${{ steps.get-version.outputs.version }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Tag: $TAG"

  build-electron:
    name: Build Electron App (Windows)
    needs: version-and-tag
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --frozen-lockfile

      - name: Build Electron app
        run: npm run package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-windows
          path: |
            release/build/*.exe
            release/build/*.zip
          if-no-files-found: warn

  build-electron-macos:
    name: Build Electron App (macOS)
    needs: version-and-tag
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --frozen-lockfile

      - name: Build Electron app
        run: npm run package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASS: ${{ secrets.APPLE_ID_PASS }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-macos
          path: |
            release/build/*.dmg
            release/build/*.zip
          if-no-files-found: warn

  build-electron-linux:
    name: Build Electron App (Linux)
    needs: version-and-tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --frozen-lockfile

      - name: Build Electron app
        run: npm run package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-linux
          path: |
            release/build/*.AppImage
            release/build/*.zip
          if-no-files-found: warn

  # Bundled media-server archives: server binary + bin/ (ffmpeg, ffprobe,
  # ffplay, exiftool, onnxruntime, embed, onnxtag) + lokictl, per target.
  # The server resolves bundled deps relative to its executable, so the
  # bin/ folder MUST ship inside the archive — a bare binary boots with
  # every media-processing feature broken.
  build-media-server:
    name: Build Media Server (${{ matrix.target }})
    needs: version-and-tag
    strategy:
      fail-fast: false
      matrix:
        include:
          # server_cgo: the server binary itself is pure Go everywhere except
          # macOS, where the menu-bar tray needs Cocoa (tray_darwin.go).
          - os: windows-latest
            target: windows-amd64
            goos: windows
            goarch: amd64
            ext: .exe
            server_cgo: '0'
            # -H=windowsgui: tray-only app, no console window
            ldflags: '-s -w -H=windowsgui'
            fetch_cmd: 'powershell -File media-server/scripts/fetch-bundled-deps.ps1 -Target windows-amd64 -Mode verify'
          - os: ubuntu-latest
            target: linux-amd64
            goos: linux
            goarch: amd64
            ext: ''
            server_cgo: '0'
            ldflags: '-s -w'
            fetch_cmd: 'media-server/scripts/fetch-bundled-deps.sh linux-amd64 verify'
          - os: macos-14 # Apple Silicon
            target: darwin-arm64
            goos: darwin
            goarch: arm64
            ext: ''
            server_cgo: '1'
            ldflags: '-s -w'
            fetch_cmd: 'media-server/scripts/fetch-bundled-deps.sh darwin-arm64 verify'
          # macos-13 was retired 2025-12-04; macos-15-intel is the last
          # x86_64 image and lives until August 2027, after which Intel
          # macOS builds need another plan (or get dropped).
          - os: macos-15-intel # Intel
            target: darwin-amd64
            goos: darwin
            goarch: amd64
            ext: ''
            server_cgo: '1'
            ldflags: '-s -w'
            fetch_cmd: 'media-server/scripts/fetch-bundled-deps.sh darwin-amd64 verify'
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --frozen-lockfile

      - name: Build web bundle
        run: npm run build:web

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: media-server/go.sum

      - name: Install jq (unix)
        if: runner.os != 'Windows'
        run: |
          if ! command -v jq >/dev/null; then
            sudo apt-get update && sudo apt-get install -y jq || brew install jq
          fi

      # The embed/onnxtag workers require cgo (ONNX runtime C API); the fetch
      # script builds them with CGO_ENABLED=1 and fails loudly without a C
      # compiler. Linux/macOS runners ship one; Windows needs mingw-w64.
      - name: Ensure C toolchain for cgo (windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          if ! command -v gcc >/dev/null; then
            choco install mingw -y --no-progress
          fi
          gcc --version | head -1

      - name: Fetch bundled binaries
        shell: bash
        run: ${{ matrix.fetch_cmd }}

      - name: Build server
        working-directory: ./media-server
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.server_cgo }}
        run: go build -ldflags="${{ matrix.ldflags }}" -o lowkeymediaserver${{ matrix.ext }} .

      - name: Build lokictl
        working-directory: ./media-server
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: go build -ldflags="-s -w" -o lokictl${{ matrix.ext }} ./cmd/lokictl

      - name: Stage release dir
        shell: bash
        run: |
          mkdir -p release/${{ matrix.target }}/bin
          cp media-server/lowkeymediaserver${{ matrix.ext }} release/${{ matrix.target }}/
          cp media-server/lokictl${{ matrix.ext }} release/${{ matrix.target }}/
          cp -R media-server/bin/* release/${{ matrix.target }}/bin/
          # License notices (GPL ffmpeg builds require them in the distribution)
          cp -R media-server/licenses release/${{ matrix.target }}/licenses
          # Example systemd unit for Linux users
          if [ "${{ matrix.goos }}" = "linux" ]; then
            cp media-server/packaging/linux/lowkeymediaserver.service release/${{ matrix.target }}/
          fi

      # macOS: sign everything with the same Developer ID cert the Electron
      # build uses, then notarize. Both steps skip cleanly when the signing
      # secrets are absent (the release still ships, just unsigned). Without
      # this, Gatekeeper hard-blocks the downloaded binaries.
      # Credentials arrive exactly as they do for the Electron client build:
      # the same secrets mapped into the same env var names on the step. The
      # scripts skip gracefully when they're absent, so a fork or a
      # credential rotation never breaks the release — it just ships
      # unsigned.
      - name: Sign macOS binaries
        if: runner.os == 'macOS'
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${CSC_LINK:-}" ]; then
            echo "CSC_LINK not provided — skipping code signing (unsigned build)"
            exit 0
          fi
          KEYCHAIN="$RUNNER_TEMP/server-sign.keychain-db"
          KC_PASS="$(openssl rand -hex 16)"
          security create-keychain -p "$KC_PASS" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KC_PASS" "$KEYCHAIN"
          # CSC_LINK is the base64-encoded .p12 (same convention as electron-builder)
          echo "$CSC_LINK" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -P "$CSC_KEY_PASSWORD" -A \
            -t cert -f pkcs12 -k "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KC_PASS" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" login.keychain
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN" \
            | grep "Developer ID Application" | head -1 | awk '{print $2}')
          echo "signing with identity $IDENTITY"

          T=release/${{ matrix.target }}
          # Plain Mach-O executables + the ONNX runtime dylib. exiftool and
          # its lib/ are Perl scripts — not signable, not checked by
          # notarization.
          for f in "$T/lowkeymediaserver" "$T/lokictl" "$T/bin/ffmpeg" "$T/bin/ffprobe" "$T/bin/onnxruntime.dylib"; do
            codesign --force --sign "$IDENTITY" --options runtime --timestamp "$f"
          done
          # The workers dlopen the ONNX runtime — sign with the
          # library-validation entitlement.
          for f in "$T/bin/embed" "$T/bin/onnxtag"; do
            codesign --force --sign "$IDENTITY" --options runtime --timestamp \
              --entitlements media-server/packaging/macos/entitlements.plist "$f"
          done
          codesign --verify --strict "$T/lowkeymediaserver"

      - name: Smoke test (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: media-server/scripts/smoke-bundled.sh release/${{ matrix.target }}

      # The Mac-native artifact: a menu-bar agent .app inside a DMG. The
      # bundle reuses the already-signed payload binaries (deps live under
      # Contents/MacOS/bin, which the server's executable-relative resolver
      # handles unchanged). Runs even without signing secrets — the DMG is
      # just unsigned then.
      - name: Package macOS app + DMG
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          media-server/scripts/make-macos-app.sh \
            "release/${{ matrix.target }}" dist-app "${{ needs.version-and-tag.outputs.version }}"
          IDENTITY=$(security find-identity -v -p codesigning 2>/dev/null \
            | grep "Developer ID Application" | head -1 | awk '{print $2}' || true)
          if [ -n "$IDENTITY" ]; then
            # Nested Mach-Os were signed in the payload; sign the bundle
            # itself (seals resources + re-signs the main executable).
            codesign --force --options runtime --timestamp --sign "$IDENTITY" \
              "dist-app/Lowkey Media Server.app"
            codesign --verify --strict --deep "dist-app/Lowkey Media Server.app"
          else
            echo "no Developer ID identity in keychain — app left unsigned"
          fi
          ln -s /Applications dist-app/Applications
          hdiutil create -volname "Lowkey Media Server" -srcfolder dist-app \
            -ov -format UDZO "release/lowkey-media-server-${{ matrix.target }}.dmg"
          if [ -n "$IDENTITY" ]; then
            codesign --force --timestamp --sign "$IDENTITY" \
              "release/lowkey-media-server-${{ matrix.target }}.dmg"
          fi

      # One notarization covers everything: tickets are recorded per code
      # signature, so the identical signed binaries inside the tar.gz pass
      # Gatekeeper's online check too. The DMG gets its ticket stapled for
      # fully-offline verification.
      - name: Notarize and staple DMG
        if: runner.os == 'macOS'
        env:
          # Same secret set the Electron client build receives, same names.
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASS: ${{ secrets.APPLE_ID_PASS }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
        shell: bash
        run: |
          set -euo pipefail
          # electron-builder accepts either password var; do the same.
          PASSWORD="${APPLE_APP_SPECIFIC_PASSWORD:-${APPLE_ID_PASS:-}}"
          if [ -z "${CSC_LINK:-}" ] || [ -z "${APPLE_ID:-}" ] || [ -z "$PASSWORD" ] || [ -z "${APPLE_TEAM_ID:-}" ]; then
            echo "Apple credentials not provided — skipping notarization"
            exit 0
          fi
          xcrun notarytool submit "release/lowkey-media-server-${{ matrix.target }}.dmg" \
            --apple-id "$APPLE_ID" \
            --password "$PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "release/lowkey-media-server-${{ matrix.target }}.dmg"

      - name: Smoke test (windows)
        if: runner.os == 'Windows'
        run: powershell -File media-server/scripts/smoke-bundled.ps1 release/windows-amd64

      - name: Archive
        shell: bash
        run: |
          cd release
          if [ "${{ matrix.goos }}" = "windows" ]; then
            7z a lowkey-media-server-${{ matrix.target }}.zip ${{ matrix.target }}/*
          else
            tar -czf lowkey-media-server-${{ matrix.target }}.tar.gz ${{ matrix.target }}
          fi

      # Friendly install path for Windows: per-user installer (no UAC), Start
      # Menu entry, optional start-with-Windows, launches into the setup
      # wizard at finish. Inno Setup 6 is preinstalled on windows runners.
      - name: Build Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" `
            /DAppVersion=${{ needs.version-and-tag.outputs.version }} `
            /DStageDir="$PWD\release\windows-amd64" `
            /O"release" `
            media-server\packaging\windows\setup.iss

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-${{ matrix.target }}
          path: |
            release/lowkey-media-server-${{ matrix.target }}.*
            release/lowkey-media-server-setup-windows-amd64.exe

  # Container image — the easiest install path for Linux/NAS users. Publishes
  # to GHCR with both a version tag and :latest.
  publish-docker:
    name: Publish Docker Image
    needs: version-and-tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        env:
          # Don't upload the .dockerbuild build-record artifact — nothing
          # consumes it, and a corrupt upload once blocked the release job.
          DOCKER_BUILD_RECORD_UPLOAD: 'false'
        with:
          context: .
          file: media-server/Dockerfile
          push: true
          tags: |
            ghcr.io/stevecastle/lowkey-media-server:latest
            ghcr.io/stevecastle/lowkey-media-server:${{ needs.version-and-tag.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  generate-changelog:
    name: Generate AI Changelog
    needs: version-and-tag
    runs-on: ubuntu-latest
    outputs:
      changelog: ${{ steps.generate.outputs.changelog }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get previous tag
        id: prev-tag
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -2 | tail -1)
          if [ -z "$PREV_TAG" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
          fi
          echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: generate
        run: |
          CURRENT_TAG="v${{ needs.version-and-tag.outputs.version }}"
          PREV_TAG="${{ steps.prev-tag.outputs.prev_tag }}"

          echo "# What's Changed in $CURRENT_TAG" > changelog.md
          echo "" >> changelog.md

          # Get commit messages - use HEAD if PREV_TAG is a commit hash
          if git rev-parse --verify "$PREV_TAG" >/dev/null 2>&1; then
            git log --pretty=format:"- %s (%h)" $PREV_TAG..HEAD >> changelog.md
          else
            git log --pretty=format:"- %s (%h)" >> changelog.md
          fi

          # Get contributors — strip spaces from author names so @-mentions
          # resolve to the GitHub handle (e.g. "Steve Castle" -> @SteveCastle).
          echo "" >> changelog.md
          echo "" >> changelog.md
          echo "## Contributors" >> changelog.md
          if git rev-parse --verify "$PREV_TAG" >/dev/null 2>&1; then
            git log $PREV_TAG..HEAD --format='%aN' | sed 's/ //g' | sort -u | sed 's/^/- @/' >> changelog.md
          else
            git log --format='%aN' | sed 's/ //g' | sort -u | sed 's/^/- @/' >> changelog.md
          fi

          # Output for next step
          CHANGELOG=$(cat changelog.md)
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Upload changelog
        uses: actions/upload-artifact@v4
        with:
          name: changelog
          path: changelog.md

  create-release:
    name: Create GitHub Release
    needs:
      [
        version-and-tag,
        build-electron,
        build-electron-macos,
        build-electron-linux,
        build-media-server,
        generate-changelog,
      ]
    runs-on: ubuntu-latest
    if: needs.version-and-tag.outputs.tag != ''
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Only the artifacts the release actually uses. Incidental artifacts
      # (e.g. buildx's *.dockerbuild build record) must not be able to fail
      # the release: one corrupt blob blocked v2.18.0 until it was deleted.
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: '{electron-*,server-*,changelog}'

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name "*.dmg" -o -name "*.AppImage" -o -name "*.exe" -o -name "*.zip" -o -name "*.tar.gz" \) -exec cp {} release-assets/ \;
          ls -lh release-assets/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.version-and-tag.outputs.tag }}
          name: Release ${{ needs.version-and-tag.outputs.version }}
          body: ${{ needs.generate-changelog.outputs.changelog }}
          draft: false
          prerelease: false
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
